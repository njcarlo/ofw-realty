[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "node dist/main"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production]

# Disable Railway's vulnerability scanner for monorepo
# The root package-lock.json contains Next.js (for the web apps) which
# triggers false positives — the API itself has no Next.js dependency.

[nixpacks]
# Supabase JS 2.103+ requires Node >= 20
nodeVersion = "20"
